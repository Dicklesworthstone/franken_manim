[target-features]
# Certified SIMD build tiers (§17.3, D-15). The certified engine's scalar
# path is the definition; every tier must match it bit-for-bit under the
# §10.5 lane rules (fixed-order, lane-count-independent reductions; no
# FMA contraction on certified paths even where the tier enables the
# instruction set).
portable	baseline	no target-feature flags; the definition tier
x86-64-v3	+avx2,+bmi2,+fma	fma enabled at ISA level, forbidden in certified kernels by construction (§10.5d)
x86-64-v4	+avx512f,+avx512bw,+avx512dq,+avx512vl	weekly-matrix tier (R22)
aarch64-neon	+neon	baseline on aarch64; certified matrix member
