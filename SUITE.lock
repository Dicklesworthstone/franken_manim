# SUITE.lock — the governed universe (D1, §2.8, §3; fm-g2c).
#
# Everything FrankenManim builds against is pinned HERE: the exact rustc
# nightly (never "or later"), the exact commit of every FrankenSuite
# foundation repo, and the certified target-feature sets per SIMD build
# tier. CI builds only from this lock. The companion per-package
# allowlist is SUITE_ALLOWLIST.tsv; the enforcement is
# crates/fmn-conformance/tests/governed_closure.rs, which fails on any
# package in the workspace's Cargo.lock that this pair does not admit.
#
# THE UPGRADE RITUAL (R17): upgrades are deliberate, never incidental.
# 1. Bump the pin here (and the allowlist rows it affects) in a commit
#    that does nothing else.
# 2. Run the full Gauntlet; diff self-goldens and the Look Gallery.
#    A drifted golden is a finding to adjudicate, not noise to re-bless.
# 3. Record the adjudication in the commit message; land only green.
# Line format: section-tagged, tab-separated, std-parseable — no TOML/
# YAML dependency anywhere in the checker.

[toolchain]
rustc	nightly-2026-07-05
edition	2024

