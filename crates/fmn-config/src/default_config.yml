  green_d: "#77B05D"
  green_c: "#83C167"
  green_b: "#A6CF8C"
  green_a: "#C9E2AE"
  yellow_e: "#E8C11C"
  yellow_d: "#F4D345"
  yellow_c: "#FFFF00"
  yellow_b: "#FFEA94"
  yellow_a: "#FFF1B6"
  gold_e: "#C78D46"
  gold_d: "#E1A158"
  gold_c: "#F0AC5F"
  gold_b: "#F9B775"
  gold_a: "#F7C797"
