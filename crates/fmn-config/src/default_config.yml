# DEBUG / INFO / WARNING / ERROR / CRITICAL
log_level: "INFO"
universal_import_line: "from manimlib import *"
ignore_manimlib_modules_on_reload: True

# ---- FrankenManim-native sections (quality knobs select engines and
# ---- schedules; they are never scene-visible data — §4)

determinism:
  # standard | certified   (the CLI's --reproducible selects certified)
  mode: "standard"
  # The one PCG64DXSM stream's seed; named substreams derive from it
  seed: 0
render:
  # cpu | metal | cuda   (annex engines are standard-mode only, §10.7)
  engine: "cpu"
  # adaptive | ssaa2x | ssaa4x   (forced supersampling exists for A/B)
  aa: "adaptive"
  # auto, or a fixed thread count
  threads: "auto"
