name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (linux-x86-64, pinned nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rustup resolves the exact toolchain from rust-toolchain.toml; no
      # floating "nightly" ever runs in CI.
      - name: Install pinned toolchain
        run: rustup show active-toolchain

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}

      - name: Run the mandatory gate
        run: bash scripts/check.sh
